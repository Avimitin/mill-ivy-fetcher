name: Test

on:
    push:
        branches: ["master"]
    pull_request:
        branches: ["master"]
        types: ["opened", "synchronize", "reopened", "ready_for_review"]

permissions:
    contents: read

jobs:
    format-check:
        if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: DeterminateSystems/nix-installer-action@main
            - name: Check formatting
              run: nix fmt -- --ci

    gen-build-matrix:
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.set-matrix.outputs.matrix }}
        steps:
            - uses: actions/checkout@v4
            - uses: DeterminateSystems/nix-installer-action@main
            - name: "Set Matrix"
              id: set-matrix
              run: |
                  nix eval --json ".#millVersions.allVersions" | nix run '.#jq' -- -rc '"matrix=" + ({version: .} | tostring)' > "$GITHUB_OUTPUT"

    build-mill-versions:
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
        needs: [gen-build-matrix]
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJSON(needs.gen-build-matrix.outputs.matrix) }}
        steps:
            - uses: actions/checkout@v4
            - uses: DeterminateSystems/nix-installer-action@main
            - run: |
                  nix build '.#millVersions.${{ matrix.version }}'
                  result/bin/mill --version

    integration-test:
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: DeterminateSystems/nix-installer-action@main
            - name: Allow unprivileged user namespaces
              run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
            - name: Check Lock is latest
              run: |
                  set -exuo pipefail
                  # Regenerate the lock file; dependency changes must be reviewed.
                  nix run '.#ci-test.bump' --max-jobs auto 2>&1 | tail -n30

                  if ! git diff --exit-code .github/integration/chisel-lock.json; then
                    echo "Error: chisel-lock.json has been modified by bump"
                    echo "Please review dependency changes and commit the updated lock file"
                    exit 1
                  fi

            - name: Integration test
              run: |
                  set -exuo pipefail
                  # First build
                  nix build '.#ci-test' --max-jobs auto 2>&1 | tail -n30
                  FIRST_HASH="$(nix hash path --sri --algo sha256 --mode nar "$(realpath ./result)")"

                  # Rebuild and verify reproducibility
                  rm -rf result
                  nix build '.#ci-test' --max-jobs auto --rebuild 2>&1 | tail -n30
                  SECOND_HASH="$(nix hash path --sri --algo sha256 --mode nar "$(realpath ./result)")"

                  if [ "$FIRST_HASH" != "$SECOND_HASH" ]; then
                    echo "Build is not reproducible!"
                    echo "First build hash:  $FIRST_HASH"
                    echo "Second build hash: $SECOND_HASH"
                    exit 1
                  fi

                  echo "Build is reproducible"
