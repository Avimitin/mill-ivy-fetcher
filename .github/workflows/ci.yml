name: Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  gen-build-matrix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: DeterminateSystems/nix-installer-action@main
    - run: |
        nix eval --json ".#millVersions.allVersions" | nix run '.#jq' -- -r '{version: .}' > "$GITHUB_OUTPUT"

  build-mill-versions:
    needs: [gen-build-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.gen-build-matrix.outputs) }}
    steps:
    - uses: actions/checkout@v4
    - uses: DeterminateSystems/nix-installer-action@main
    - run: |
        nix build '.#millVersions.{{ matrix.version }}'

  integration-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: DeterminateSystems/nix-installer-action@main
    - name: Integration test
      run: |
        nix build '.#ci-test' --max-jobs auto
